<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>SERVER. BGR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Syne+Mono&display=swap');

- { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–bg: #c2c2c2;
}

html, body {
width: 100%;
height: 100%;
overflow: hidden;
background: var(–bg);
font-family: ‘Cormorant Garamond’, serif;
touch-action: none;
-webkit-tap-highlight-color: transparent;
-webkit-user-select: none;
user-select: none;
}

#canvas-container {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
z-index: 1;
}

canvas { display: block; width: 100% !important; height: 100% !important; }

/* Top title — SERVER. BGR */
.top-title {
position: fixed;
top: 32px;
left: 50%;
transform: translateX(-50%);
z-index: 10;
pointer-events: none;
font-family: ‘Syne Mono’, monospace;
font-size: 11px;
letter-spacing: 6px;
text-transform: uppercase;
color: #3a3a3a;
opacity: 0;
animation: fadeSlideDown 1.2s ease-out 0.5s forwards;
}

/* Mode buttons — bottom center */
.mode-controls {
position: fixed;
bottom: 40px;
left: 50%;
transform: translateX(-50%);
z-index: 20;
display: flex;
gap: 2px;
opacity: 0;
animation: fadeSlideUp 1s ease-out 2s forwards;
}

.mode-btn {
pointer-events: all;
background: rgba(160,160,160,0.35);
border: 1px solid #888;
color: #3a3a3a;
font-family: ‘Syne Mono’, monospace;
font-size: 9px;
letter-spacing: 2px;
padding: 10px 20px;
cursor: pointer;
transition: all 0.4s ease;
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
text-transform: uppercase;
}

.mode-btn:first-child { border-radius: 20px 0 0 20px; }
.mode-btn:last-child { border-radius: 0 20px 20px 0; }

.mode-btn.active {
background: rgba(80,80,80,0.4);
border-color: #666;
color: #1a1a1a;
}

/* Loading screen */
#loading {
position: fixed;
inset: 0;
z-index: 100;
background: var(–bg);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
transition: opacity 1s ease-out;
}

#loading.fade-out {
opacity: 0;
pointer-events: none;
}

#loading.gone { display: none; }

#loading h2 {
font-family: ‘Syne Mono’, monospace;
font-weight: 400;
font-size: 11px;
letter-spacing: 6px;
text-transform: uppercase;
color: #3a3a3a;
}

.load-bar {
width: 120px; height: 1px;
background: #aaa;
margin-top: 24px;
position: relative;
overflow: hidden;
}

.load-bar::after {
content: ‘’;
position: absolute;
left: 0; top: 0;
width: 100%; height: 100%;
background: #555;
animation: loadProgress 2s ease-in-out forwards;
}

/* Error fallback */
#error-msg {
display: none;
position: fixed;
inset: 0;
z-index: 200;
background: var(–bg);
flex-direction: column;
align-items: center;
justify-content: center;
font-family: ‘Syne Mono’, monospace;
font-size: 11px;
letter-spacing: 2px;
color: #555;
text-align: center;
line-height: 2.4;
}

/* Animations */
@keyframes fadeSlideDown { from { opacity:0; transform:translateX(-50%) translateY(-12px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
@keyframes fadeSlideUp { from { opacity:0; transform:translateX(-50%) translateY(12px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
@keyframes loadProgress { 0% { transform:scaleX(0); transform-origin:left; } 100% { transform:scaleX(1); transform-origin:left; } }
</style>

</head>
<body>

<!-- Loading -->

<div id="loading">
  <h2>Server. BGR</h2>
  <div class="load-bar"></div>
</div>

<!-- Error fallback -->

<div id="error-msg">
  WebGL is required to view this installation.<br>
  Please open in Safari or Chrome.
</div>

<!-- Top title only -->

<div class="top-title">Server. BGR</div>

<!-- Mode Controls — bottom center -->

<div class="mode-controls" id="modeControls">
  <button class="mode-btn active" data-mode="wire" onclick="setMode('wire')">Wire</button>
  <button class="mode-btn" data-mode="ghost" onclick="setMode('ghost')">Ghost</button>
  <button class="mode-btn" data-mode="xray" onclick="setMode('xray')">X-Ray</button>
</div>

<!-- 3D Canvas -->

<div id="canvas-container"></div>

<!-- Loading dismissal — independent of Three.js -->

<script>
(function() {
  var loadEl = document.getElementById('loading');
  setTimeout(function() {
    loadEl.classList.add('fade-out');
    setTimeout(function() { loadEl.classList.add('gone'); }, 1200);
  }, 2200);
})();
</script>

<!-- Three.js CDN -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- Main 3D Scene -->

<script>
(function() {
  if (typeof THREE === 'undefined') {
    document.getElementById('error-msg').style.display = 'flex';
    return;
  }
  var tc = document.createElement('canvas');
  var gl = tc.getContext('webgl') || tc.getContext('experimental-webgl');
  if (!gl) {
    document.getElementById('error-msg').style.display = 'flex';
    return;
  }

  // ========== SCENE ==========
  var BG = 0xc2c2c2;
  var container = document.getElementById('canvas-container');
  var scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(BG, 0.028);

  var camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(4, 3, 5);
  camera.lookAt(0, 0.8, 0);

  var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(BG);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  container.appendChild(renderer.domElement);

  // ========== LIGHTING ==========
  scene.add(new THREE.AmbientLight(0x999999, 0.6));

  var keyLight = new THREE.DirectionalLight(0xffffff, 0.7);
  keyLight.position.set(5, 8, 4);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(2048, 2048);
  keyLight.shadow.camera.near = 0.5;
  keyLight.shadow.camera.far = 30;
  keyLight.shadow.camera.left = -5;
  keyLight.shadow.camera.right = 5;
  keyLight.shadow.camera.top = 5;
  keyLight.shadow.camera.bottom = -5;
  keyLight.shadow.bias = -0.001;
  scene.add(keyLight);

  var fillLight = new THREE.DirectionalLight(0xcccccc, 0.35);
  fillLight.position.set(-3, 4, -2);
  scene.add(fillLight);

  var rimLight = new THREE.PointLight(0xaaaaaa, 0.3, 15);
  rimLight.position.set(-2, 3, -4);
  scene.add(rimLight);

  // ========== GROUND ==========
  var ground = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    new THREE.MeshStandardMaterial({ color: 0xa8a8a8, roughness: 0.9, metalness: 0.05 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.01;
  ground.receiveShadow = true;
  scene.add(ground);

  var grid = new THREE.GridHelper(20, 40, 0xb5b5b5, 0xb0b0b0);
  grid.position.y = 0.005;
  scene.add(grid);

  var plat = new THREE.Mesh(
    new THREE.CylinderGeometry(1.8, 2.0, 0.02, 64),
    new THREE.MeshStandardMaterial({ color: 0xb0b0b0, roughness: 0.85, metalness: 0.1 })
  );
  plat.position.y = 0.01;
  plat.receiveShadow = true;
  scene.add(plat);

  var rng = new THREE.Mesh(
    new THREE.RingGeometry(1.79, 1.82, 64),
    new THREE.MeshBasicMaterial({ color: 0x999999, side: THREE.DoubleSide })
  );
  rng.rotation.x = -Math.PI / 2;
  rng.position.y = 0.025;
  scene.add(rng);

  // ========== CHAIR FRAME ==========
  var chairGroup = new THREE.Group();
  var frameMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.35, metalness: 0.65 });
  var wireframeMat = new THREE.LineBasicMaterial({ color: 0x444444 });
  var tr = 0.025, ts = 8;

  function tube(a, b, r) {
    r = r || tr;
    var d = new THREE.Vector3().subVectors(b, a);
    var l = d.length();
    var m = new THREE.Mesh(new THREE.CylinderGeometry(r, r, l, ts), frameMat);
    m.castShadow = true;
    m.position.addVectors(a, b).multiplyScalar(0.5);
    m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), d.clone().normalize());
    return m;
  }

  function joint(p, r) {
    r = r || tr * 1.3;
    var m = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 12), frameMat);
    m.position.copy(p);
    m.castShadow = true;
    return m;
  }

  var sH = 0.9, sW = 0.85, sD = 0.85, bH = 1.65, bT = 0.12;

  var fl_l = new THREE.Vector3(-sW/2, 0, sD/2);
  var fl_r = new THREE.Vector3(sW/2, 0, sD/2);
  var bl_l = new THREE.Vector3(-sW/2+0.03, 0, -sD/2);
  var bl_r = new THREE.Vector3(sW/2-0.03, 0, -sD/2);
  var s_fl = new THREE.Vector3(-sW/2, sH, sD/2);
  var s_fr = new THREE.Vector3(sW/2, sH, sD/2);
  var s_bl = new THREE.Vector3(-sW/2+0.03, sH, -sD/2);
  var s_br = new THREE.Vector3(sW/2-0.03, sH, -sD/2);
  var b_tl = new THREE.Vector3(-sW/2+0.05, bH, -sD/2-bT);
  var b_tr = new THREE.Vector3(sW/2-0.05, bH, -sD/2-bT);
  var b_ml = new THREE.Vector3(-sW/2+0.04, sH+(bH-sH)*0.5, -sD/2-bT*0.5);
  var b_mr = new THREE.Vector3(sW/2-0.04, sH+(bH-sH)*0.5, -sD/2-bT*0.5);
  var s_ml = new THREE.Vector3(-sW/2+0.015, sH, 0);
  var s_mr = new THREE.Vector3(sW/2-0.015, sH, 0);
  var s_fm = new THREE.Vector3(0, sH, sD/2);
  var s_bm = new THREE.Vector3(0, sH, -sD/2);
  var stH = 0.25;
  var st_fl = new THREE.Vector3(-sW/2, stH, sD/2);
  var st_fr = new THREE.Vector3(sW/2, stH, sD/2);
  var st_bl = new THREE.Vector3(-sW/2+0.03, stH, -sD/2);
  var st_br = new THREE.Vector3(sW/2-0.03, stH, -sD/2);

  [tube(fl_l,s_fl), tube(fl_r,s_fr), tube(bl_l,b_tl), tube(bl_r,b_tr),
   tube(s_fl,s_fr), tube(s_fr,s_br), tube(s_br,s_bl), tube(s_bl,s_fl),
   tube(s_fl,s_br,tr*0.7), tube(s_fr,s_bl,tr*0.7),
   tube(s_ml,s_mr,tr*0.7), tube(s_fm,s_bm,tr*0.7),
   tube(b_tl,b_tr), tube(b_ml,b_mr),
   tube(st_fl,st_fr,tr*0.7), tube(st_bl,st_br,tr*0.7),
   tube(st_fl,st_bl,tr*0.7), tube(st_fr,st_br,tr*0.7)
  ].forEach(function(m) { chairGroup.add(m); });

  for (var i = 1; i <= 3; i++) {
    var t = i / 4;
    chairGroup.add(tube(
      new THREE.Vector3().lerpVectors(s_bl, s_br, t),
      new THREE.Vector3().lerpVectors(b_tl, b_tr, t),
      tr * 0.6
    ));
  }

  [fl_l,fl_r,bl_l,bl_r,s_fl,s_fr,s_bl,s_br,b_tl,b_tr,b_ml,b_mr,st_fl,st_fr,st_bl,st_br].forEach(function(p) {
    chairGroup.add(joint(p));
  });

  scene.add(chairGroup);

  // ========== WIREFRAME OVERLAY ==========
  var wireGroup = new THREE.Group();
  chairGroup.children.forEach(function(c) {
    if (c.geometry) {
      var line = new THREE.LineSegments(new THREE.EdgesGeometry(c.geometry), wireframeMat);
      line.position.copy(c.position);
      line.quaternion.copy(c.quaternion);
      line.scale.copy(c.scale);
      wireGroup.add(line);
    }
  });
  wireGroup.visible = false;
  scene.add(wireGroup);

  // ========== PARTICLES ==========
  var pc = 150;
  var pg = new THREE.BufferGeometry();
  var pp = new Float32Array(pc * 3);
  for (var i = 0; i < pc; i++) {
    pp[i*3] = (Math.random()-0.5)*20;
    pp[i*3+1] = Math.random()*8;
    pp[i*3+2] = (Math.random()-0.5)*20;
  }
  pg.setAttribute('position', new THREE.BufferAttribute(pp, 3));
  scene.add(new THREE.Points(pg, new THREE.PointsMaterial({
    color: 0x999999, size: 0.015, sizeAttenuation: true, transparent: true, opacity: 0.4
  })));

  // ========== CONTROLS ==========
  var isDragging = false, prevX = 0, prevY = 0;
  var theta = Math.PI/4, phi = Math.PI/6, radius = 6.5;
  var autoRotate = true, lastInteraction = 0;

  function updateCamera() {
    camera.position.x = radius * Math.sin(theta) * Math.cos(phi);
    camera.position.y = radius * Math.sin(phi) + 1.0;
    camera.position.z = radius * Math.cos(theta) * Math.cos(phi);
    camera.lookAt(0, 0.8, 0);
  }

  var el = renderer.domElement;
  el.addEventListener('pointerdown', function(e) {
    isDragging = true; prevX = e.clientX; prevY = e.clientY;
    autoRotate = false; lastInteraction = Date.now();
  });
  el.addEventListener('pointermove', function(e) {
    if (!isDragging) return;
    theta -= (e.clientX - prevX) * 0.008;
    phi += (e.clientY - prevY) * 0.006;
    phi = Math.max(-0.1, Math.min(Math.PI/2.5, phi));
    prevX = e.clientX; prevY = e.clientY;
  });
  el.addEventListener('pointerup', function() { isDragging = false; lastInteraction = Date.now(); });
  el.addEventListener('pointercancel', function() { isDragging = false; lastInteraction = Date.now(); });

  var ipd = 0, ir = radius;
  el.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      ipd = Math.sqrt(dx*dx+dy*dy); ir = radius;
    }
  }, { passive: true });
  el.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      radius = Math.max(3.5, Math.min(12, ir*(ipd/Math.sqrt(dx*dx+dy*dy))));
    }
  }, { passive: true });
  el.addEventListener('wheel', function(e) {
    e.preventDefault();
    radius = Math.max(3.5, Math.min(12, radius + e.deltaY*0.005));
    autoRotate = false; lastInteraction = Date.now();
  }, { passive: false });

  // ========== MODES ==========
  var ghostMat = new THREE.MeshStandardMaterial({
    color: 0x777777, roughness: 0.3, metalness: 0.6, transparent: true, opacity: 0.18
  });
  var xrayMat = new THREE.MeshStandardMaterial({
    color: 0x6688aa, roughness: 0.2, metalness: 0.8, transparent: true, opacity: 0.25
  });
  var xrayWire = new THREE.LineBasicMaterial({ color: 0x556688 });

  window.setMode = function(mode) {
    document.querySelectorAll('.mode-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    switch (mode) {
      case 'wire':
        chairGroup.children.forEach(function(c) { if (c.material) c.material = frameMat; });
        wireGroup.visible = false;
        scene.fog = new THREE.FogExp2(BG, 0.028);
        renderer.setClearColor(BG);
        break;
      case 'ghost':
        chairGroup.children.forEach(function(c) { if (c.material) c.material = ghostMat; });
        wireGroup.visible = true;
        wireGroup.children.forEach(function(c) { if (c.material) c.material = wireframeMat; });
        scene.fog = new THREE.FogExp2(0xbababa, 0.025);
        renderer.setClearColor(0xbababa);
        break;
      case 'xray':
        chairGroup.children.forEach(function(c) { if (c.material) c.material = xrayMat; });
        wireGroup.visible = true;
        wireGroup.children.forEach(function(c) { if (c.material) c.material = xrayWire; });
        scene.fog = new THREE.FogExp2(0xb8bcc5, 0.025);
        renderer.setClearColor(0xb8bcc5);
        break;
    }
  };

  // ========== ANIMATE ==========
  function animate() {
    requestAnimationFrame(animate);
    if (!isDragging && Date.now() - lastInteraction > 5000) autoRotate = true;
    if (autoRotate && !isDragging) theta += 0.002;
    chairGroup.position.y = Math.sin(Date.now() * 0.001) * 0.015;
    var pa = pg.attributes.position.array;
    for (var j = 0; j < pc; j++) pa[j*3+1] += Math.sin(Date.now()*0.0003+j)*0.0003;
    pg.attributes.position.needsUpdate = true;
    updateCamera();
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  updateCamera();
  setMode('wire');
  animate();
})();
</script>

</body>
</html>
